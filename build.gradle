plugins {
    id 'java'
}

group = 'com.example.burp'
version = '1.0.0'

java {
    sourceCompatibility = JavaVersion.VERSION_17
    targetCompatibility = JavaVersion.VERSION_17
}

tasks.withType(JavaCompile).configureEach {
    options.compilerArgs += ['-Xlint:-deprecation']
}

repositories {
    mavenCentral()
}

dependencies {
    compileOnly 'net.portswigger.burp.extensions:montoya-api:2025.12'
    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.0'
    testImplementation 'net.portswigger.burp.extensions:montoya-api:2025.12'
}

jar {
    archiveFileName = 'sqli-probe.jar'
    manifest {
        attributes 'Main-Class': 'com.example.burp.sqli.SqliProbeExtension'
    }
    from {
        configurations.runtimeClasspath.collect {
            it.isDirectory() ? it : zipTree(it)
        }
    }
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}

test {
    useJUnitPlatform()
}
